server:
  port: ${SERVER_PORT:9090}

spring:
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:1000MB}
      max-request-size: ${MAX_REQUEST_SIZE:1000MB}

  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

fileBaseUrl: ${FILE_BASE_URL:http://localhost:${server.port}}

langchain4j:
  open-ai:
    chat-model:
      base-url: ${LLM_BASE_URL}
      api-key: ${LLM_API_KEY}
      model-name: ${LLM_CHAT_MODEL:qwen3.5-plus}
      log-requests: ${LLM_LOG_REQUESTS:true}
      log-responses: ${LLM_LOG_RESPONSES:true}

    streaming-chat-model:
      base-url: ${LLM_BASE_URL}
      api-key: ${LLM_API_KEY}
      model-name: ${LLM_STREAM_MODEL:qwen3.5-plus}
      log-requests: ${LLM_LOG_REQUESTS:true}
      log-responses: ${LLM_LOG_RESPONSES:true}

    embedding-model:
      base-url: ${LLM_BASE_URL}
      api-key: ${LLM_API_KEY}
      model-name: ${LLM_EMBEDDING_MODEL:text-embedding-v3}
      log-requests: ${LLM_LOG_REQUESTS:true}
      log-responses: ${LLM_LOG_RESPONSES:true}
      max-segments-per-batch: ${LLM_MAX_SEGMENTS_PER_BATCH:10}

  community:
    redis:
      host: ${COMMUNITY_REDIS_HOST:localhost}
      port: ${COMMUNITY_REDIS_PORT:6379}

app:
  chat:
    memory:
      ttl-days: ${CHAT_MEMORY_TTL_DAYS:7}