server:
  port: 9090

spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB

  datasource:
    driver-class-name: ${lhz.spring.datasource.driver-class-name}
    username: ${lhz.spring.datasource.username}
    password: ${lhz.spring.datasource.password}
    url: ${lhz.spring.datasource.url}

  data:
    redis:
      host: ${lhz.spring.data.redis.host}
      port: ${lhz.spring.data.redis.port}

  rabbitmq:
    host: ${lhz.spring.rabbitmq.host:localhost}
    port: ${lhz.spring.rabbitmq.port:5672}
    username: ${lhz.spring.rabbitmq.username:guest}
    password: ${lhz.spring.rabbitmq.password:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1

mybatis:
  configuration:
    # 生产/测试环境关闭 SQL 日志，避免大量 I/O 拖慢请求
    # 排查时可改为 org.apache.ibatis.logging.stdout.StdOutImpl（仅本地开发）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

fileBaseUrl: ${lhz.fileBaseUrl}

langchain4j:
  open-ai:
    chat-model:
      base-url: ${lhz.langchain4j.open-ai.chat-model.base-url}
      api-key: ${lhz.langchain4j.open-ai.chat-model.api-key}
      model-name: ${lhz.langchain4j.open-ai.chat-model.model-name}
      timeout: 120s
      max-retries: 1
      max-tokens: 2000
      log-requests: false
      log-responses: false

    # 学习规划专用模型配置（优化超时和重试策略）
    study-plan-chat-model:
      # 默认继承通用配置，可在 application-local.yml 中覆盖
      base-url: ${lhz.langchain4j.open-ai.chat-model.base-url}
      api-key: ${lhz.langchain4j.open-ai.chat-model.api-key}
      model-name: ${lhz.langchain4j.open-ai.chat-model.model-name}
      # timeout 180s 足够模型完整生成，max-retries=0 不允许 retry 叠加耗时
      timeout: 180s
      max-retries: 0
      max-tokens: 1500

    streaming-chat-model:
      base-url: ${lhz.langchain4j.open-ai.streaming-chat-model.base-url}
      api-key: ${lhz.langchain4j.open-ai.streaming-chat-model.api-key}
      model-name: ${lhz.langchain4j.open-ai.streaming-chat-model.model-name}
      # 关闭 streaming 请求/响应日志，减少 I/O 开销
      log-requests: false
      log-responses: false

    embedding-model:
      base-url: ${lhz.langchain4j.open-ai.embedding-model.base-url}
      api-key: ${lhz.langchain4j.open-ai.embedding-model.api-key}
      model-name: ${lhz.langchain4j.open-ai.embedding-model.model-name}
      # 关闭 embedding 请求/响应日志，减少 I/O 开销（向量维度大、内容冗余）
      log-requests: false
      log-responses: false
      max-segments-per-batch: 10

  community:
    redis:
      host: ${lhz.langchain4j.community.redis.host}
      port: ${lhz.langchain4j.community.redis.port}
      dimension: 1024

app:
  chat:
    memory:
      ttl-days: 7
  knowledge-base:
    upload-dir: ${lhz.app.knowledge-base.upload-dir}
